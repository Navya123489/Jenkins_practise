apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-deployed-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jenkins-deployed-app
  template:
    metadata:
      labels:
        app: jenkins-deployed-app
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: jenkins-deployed-app
spec:
  type: NodePort
  selector:
    app: jenkins-deployed-app
  ports:
  - port: 80
    targetPort: 80
